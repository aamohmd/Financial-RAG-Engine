services:
  fastapi:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
    volumes:
      - .:/app
    command: ["fastapi", "dev", "rag/api.py", "--port", "8080", "--host", "0.0.0.0"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: paradedb/paradedb:latest
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
